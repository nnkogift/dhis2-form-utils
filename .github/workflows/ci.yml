name: CI

on:
    push:
        branches: [main, master]
    pull_request:
        branches: [main, master]

jobs:
    lint:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v4
              with:
                  name: build-dist
                  path: .
            - run: pnpm lint

    type-check:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v4
              with:
                  name: build-dist
                  path: .
            - run: pnpm typecheck

    unit-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v4
              with:
                  name: build-dist
                  path: .
            - run: pnpm exec vitest run

    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm build
            - uses: actions/upload-artifact@v4
              with:
                  name: build-dist
                  path: packages/*/dist

    storybook-test:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v4
              with:
                  name: build-dist
                  path: .
            - run: pnpm exec playwright install chromium --with-deps
            - run: pnpm --filter storybook test

    e2e:
        runs-on: ubuntu-latest
        needs: build
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - uses: actions/download-artifact@v4
              with:
                  name: build-dist
                  path: .
            - run: pnpm exec playwright install chromium --with-deps
            - run: pnpm --filter playground e2e

    fallow:
        runs-on: ubuntu-latest
        needs: lint
        continue-on-error: true
        steps:
            - uses: actions/checkout@v4
            - uses: pnpm/action-setup@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: pnpm
            - run: pnpm install --frozen-lockfile
            - run: pnpm exec fallow dead-code || true
